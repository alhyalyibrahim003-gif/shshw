<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">تسجيل الدخول - منصتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="brand-section">
            <div class="brand-logo"><i class="fas fa-video"></i></div>
            <h1 id="brandTitle">مرحباً بك</h1>
            <p id="brandSubtitle">بوابتك الأنيقة للعالم الرقمي</p>
        </div>

        <div class="form-section">
            <div class="switches-group">
                <div class="theme-switch-wrapper">
                    <label class="theme-switch">
                        <input type="checkbox" id="themeCheckbox">
                        <span class="slider round">
                            <i class="fas fa-sun icon-sun"></i>
                            <i class="fas fa-moon icon-moon"></i>
                        </span>
                    </label>
                </div>
                <div class="lang-switch-wrapper">
                    <label class="lang-switch">
                        <input type="checkbox" id="langCheckbox">
                        <span class="slider round">
                            <span class="lang-ar">AR</span>
                            <span class="lang-en">EN</span>
                        </span>
                    </label>
                </div>
            </div>

            <form id="login-form" class="auth-form form-active">
                <h2 id="loginTitle">تسجيل الدخول</h2>
                <div id="login-error-message" class="error-msg"></div>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="login-password" placeholder="كلمة المرور" required>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">دخول</button>
                <p class="switch-p"><a href="#" id="show-register">إنشاء حساب جديد</a></p>
            </form>

            <form id="register-form" class="auth-form form-hidden">
                <h2 id="registerTitle">إنشاء حساب جديد</h2>
                <div id="error-message" class="error-msg"></div>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="reg-name" placeholder="الاسم الكامل" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar-alt input-icon"></i>
                    <input type="number" id="reg-age" placeholder="العمر (أقصى 60)" min="1" max="60" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-globe input-icon"></i>
                    <input type="text" id="reg-country" list="countries-list" placeholder="الدولة" autocomplete="off" required>
                    <datalist id="countries-list">
                        <option value="مصر"><option value="السعودية"><option value="الإمارات"><option value="الكويت">
                        <option value="قطر"><option value="البحرين"><option value="عمان"><option value="اليمن">
                        <option value="العراق"><option value="الأردن"><option value="لبنان"><option value="سوريا">
                        <option value="فلسطين"><option value="ليبيا"><option value="تونس"><option value="الجزائر">
                        <option value="المغرب"><option value="موريتانيا"><option value="السودان"><option value="تركيا">
                        <option value="إيران"><option value="باكستان"><option value="أفغانستان"><option value="الهند">
                        <option value="أمريكا"><option value="كندا"><option value="بريطانيا"><option value="فرنسا">
                        <option value="ألمانيا"><option value="إيطاليا"><option value="إسبانيا"><option value="روسيا">
                        <option value="الصين"><option value="اليابان"><option value="أستراليا">
                    </datalist>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="reg-email" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="reg-password" placeholder="كلمة المرور (8 أحرف على الأقل)" minlength="8" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle input-icon"></i>
                    <input type="password" id="reg-confirm-password" placeholder="تأكيد كلمة المرور" required>
                </div>
                <button type="submit" class="btn-primary" id="registerBtn">متابعة التسجيل</button>
                <p class="switch-p"><a href="#" id="show-login">تسجيل الدخول هنا</a></p>
            </form>

            <form id="verify-form" class="auth-form form-hidden">
                <h2 id="verifyTitle">تفعيل الحساب</h2>
                <div id="verify-error-message" class="error-msg"></div>
                <p id="verifyInstruction">أدخل رمز التحقق المرسل إلى بريدك الإلكتروني</p>
                <div class="input-group">
                    <i class="fas fa-key input-icon"></i>
                    <input type="text" id="verify-code" placeholder="6 أرقام" maxlength="6" required>
                </div>
                <button type="submit" class="btn-primary" id="verifyBtn">تحقق</button>
                <p class="switch-p"><a href="#" id="back-to-register">تعديل البيانات</a></p>
            </form>
        </div>
    </div>

    <!-- مربعات الحوار -->
    <div id="logoutDialog" class="dialog hidden">
        <div class="dialog-content">
            <p id="logoutConfirmMsg">هل أنت متأكد من تسجيل الخروج؟</p>
            <div class="dialog-buttons">
                <button id="confirmLogout" class="dialog-btn confirm">نعم</button>
                <button id="cancelLogout" class="dialog-btn cancel">لا</button>
            </div>
        </div>
    </div>
    <div id="suspendedDialog" class="dialog hidden">
        <div class="dialog-content">
            <p id="suspendedMsg">تم تعليق حسابك. يرجى التواصل مع الدعم.</p>
            <div class="dialog-buttons">
                <button id="suspendedOkBtn" class="dialog-btn confirm">حسناً</button>
            </div>
        </div>
    </div>
    <div id="activationSuccessDialog" class="dialog hidden">
        <div class="dialog-content">
            <i class="fas fa-check-circle" style="font-size: 48px; color: #4caf50; margin-bottom: 20px;"></i>
            <p id="activationSuccessMsg">تم تفعيل حسابك بنجاح! 🎉</p>
            <div class="dialog-buttons">
                <button id="activationSuccessOkBtn" class="dialog-btn confirm">حسناً</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
